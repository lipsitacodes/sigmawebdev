<!DOCTYPE html>
<html lang="en">
<style>
    .child {
        background-color: aqua;
        border: 2px solid black;
        padding: 14px;
        margin: 14px;
        cursor: pointer;
    }

    .childcont {
        background-color: beige;
        border: 2px solid black;
        padding: 14px;
        margin: 14px;
    }

    .cont {
        background-color: rgb(8, 115, 168);
        border: 2px solid black;
        padding: 14px;
        margin: 14px;
    }
</style>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bubling</title>
</head>

<body>
    <div class="cont">
        <section class="childcont">
            <div class="child">I am a child</div>
        </section>
    </div>
    <script>
        // this is called as event bubling
        document.querySelector(".child").addEventListener("click", (e) => {
            e.stopPropagation()
            alert("Child was clicked")
        })

        document.querySelector(".childcont").addEventListener("click", (e) => {
            e.stopPropagation()
            alert("Child Container was clicked")
        })

        document.querySelector(".cont").addEventListener("click", (e) => {
            e.stopPropagation()
            alert("Container was clicked")
        })

        // let a = setInterval(() => {
        //     document.querySelector(".childcont").style.background = `rgb(${Math.floor(Math.random() * 256)},
        //      ${Math.floor(Math.random() * 256)},
        //      ${Math.floor(Math.random() * 256)})`;
        // }, 1000);
        // console.log(a)

        let a = setTimeout(() => {
            document.querySelector(".childcont").style.background = `rgb(${Math.floor(Math.random() * 256)},
             ${Math.floor(Math.random() * 256)},
             ${Math.floor(Math.random() * 256)})`;
        }, 5000);
        console.log(a)
    </script>
</body>

</html>
